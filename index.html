<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Venkatesh — Finance · Accounting · Commercial</title>
<meta name="description" content="Venkatesh (Ven) — Sydney-based finance, accounting & commercial analyst." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0A0A0B;
    --panel:#0E0E10;
    --card:#F4F3EF;
    --card-ink:#16151A;
    --ink:#ECECEE;
    --muted:#8C8C92;
    --muted-2:#5E5E66;
    --line:rgba(255,255,255,0.08);
    --green:#7CFCA0;
    --acc:#D8FF6B;
    --ease:cubic-bezier(0.32,0.72,0,1);
    --spring:cubic-bezier(0.34,1.56,0.64,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;overflow:hidden;
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:radial-gradient(rgba(255,255,255,0.06) 1px,transparent 1px);
    background-size:26px 26px;
    -webkit-mask-image:radial-gradient(ellipse 100% 85% at 50% 45%,#000 55%,transparent 100%);
    mask-image:radial-gradient(ellipse 100% 85% at 50% 45%,#000 55%,transparent 100%);
  }
  ::selection{background:var(--acc);color:#101012}
  a{color:inherit;text-decoration:none}

  /* ---------- TOP BAR ---------- */
  @keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px) scale(0.98)}to{opacity:1;transform:none}}
  .topbar{position:fixed;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:18px 26px;animation:fadeDown .7s var(--ease) both}
  .brand{display:flex;align-items:center;gap:10px;font-family:'Space Grotesk';font-weight:600;letter-spacing:-0.01em;font-size:16px}
  .brand .blip{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 12px var(--green)}
  .top-links{display:flex;align-items:center;gap:8px}
  .ic-btn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:rgba(255,255,255,0.04);border:1px solid var(--line);color:var(--muted);transition:transform .35s var(--spring),color .3s,background .3s}
  .ic-btn:hover{color:var(--ink);background:rgba(255,255,255,0.08);transform:translateY(-2px)}
  .cv-btn{display:inline-flex;align-items:center;gap:9px;font-size:13.5px;font-weight:600;padding:9px 9px 9px 16px;border-radius:999px;background:var(--ink);color:#0A0A0B;transition:transform .35s var(--spring),background .3s}
  .cv-btn .d{width:24px;height:24px;border-radius:50%;background:rgba(10,10,11,0.12);display:grid;place-items:center}
  .cv-btn:hover{transform:translateY(-2px);background:var(--acc)}
  .top-btn{display:inline-flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:var(--ink);background:rgba(255,255,255,0.05);border:1px solid var(--line);padding:9px 16px;border-radius:999px;transition:transform .35s var(--spring),background .3s var(--ease),border-color .3s var(--ease)}
  .top-btn .bi{display:grid;place-items:center;color:var(--green)}
  .top-btn.alt .bi{color:var(--acc)}
  .top-btn:hover{transform:translateY(-2px);background:rgba(255,255,255,0.09);border-color:rgba(216,255,107,0.45)}
  @media(max-width:720px){.top-btn .lbl{display:none}.top-btn{padding:9px 11px}}

  /* ---------- STAGE ---------- */
  .stage{height:100dvh;display:flex;align-items:center;justify-content:center;position:relative}
  .stage-glow{position:absolute;width:760px;height:560px;border-radius:50%;filter:blur(120px);opacity:0.16;background:radial-gradient(circle,var(--green),transparent 65%);top:50%;left:50%;transform:translate(-50%,-52%);pointer-events:none}

  /* ---------- CARD ---------- */
  .card{
    position:relative;z-index:5;width:min(500px,90vw);
    background:var(--card);border-radius:30px;padding:8px 8px 14px;
    box-shadow:0 44px 100px -34px rgba(0,0,0,0.9),0 0 0 1px rgba(255,255,255,0.06);
  }
  .card-tab{
    position:absolute;top:-14px;left:50%;transform:translateX(-50%) rotate(-2.5deg);z-index:9;
    background:#101012;color:#fff;font-family:'Space Grotesk';font-weight:600;font-size:12px;
    letter-spacing:0.16em;padding:6px 14px;border-radius:9px;display:flex;align-items:center;gap:8px;
    box-shadow:0 8px 20px -8px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.1);
  }
  .card-tab .blip{width:7px;height:7px;border-radius:50%;background:var(--green)}
  /* photo peeking over the top, like Milo's cut-out */
  .avatar{
    width:92px;height:92px;border-radius:50%;position:relative;z-index:6;
    margin:-38px auto 0;display:grid;place-items:center;
    font-family:'Space Grotesk';font-weight:700;font-size:36px;color:#fff;letter-spacing:-0.02em;
    background:radial-gradient(120% 120% at 50% 20%,#34343c,#0E0E10);
    box-shadow:0 14px 30px -12px rgba(0,0,0,0.7),inset 0 2px 4px rgba(255,255,255,0.06);
    filter:drop-shadow(0 0 0 #fff);
  }
  .avatar::after{content:"";position:absolute;inset:-5px;border-radius:50%;border:4px solid var(--card)}
  .avatar .ring{position:absolute;inset:-12px;border-radius:50%;border:1.5px dashed rgba(20,21,26,0.16)}
  .card-name{text-align:center;color:var(--card-ink);font-family:'Space Grotesk';font-weight:600;font-size:19px;margin-top:12px;letter-spacing:-0.01em}
  .card-role{text-align:center;color:#8a857a;font-size:12.5px;font-weight:500;margin-top:2px}

  /* hub: floating photo + terminal placard (no white card) */
  .hub{position:relative;z-index:1;width:min(480px,92vw);display:flex;flex-direction:column;align-items:center;animation:fadeUp .9s var(--ease) .12s both}
  .hub-photo{position:relative;z-index:3;width:150px;margin-bottom:-26px;filter:drop-shadow(0 18px 30px rgba(0,0,0,0.7))}
  .hub-photo img{display:block;width:100%;height:auto;-webkit-user-drag:none;user-drag:none}

  /* dark terminal panel — Milo-style placard with a fanned card stack below */
  .terminal{
    position:relative;z-index:2;width:100%;overflow:hidden;
    background:#0E0E10;border-radius:22px;padding:15px 20px 16px;
    border:1px solid rgba(255,255,255,0.12);min-height:188px;display:flex;flex-direction:column;
    box-shadow:
      0 8px 0 -1px #141418, 0 9px 0 -1px rgba(255,255,255,0.07),
      0 16px 0 -3px #111115, 0 17px 0 -3px rgba(255,255,255,0.06),
      0 24px 0 -5px #0e0e12, 0 25px 0 -5px rgba(255,255,255,0.05),
      0 32px 0 -7px #0b0b0f, 0 33px 0 -7px rgba(255,255,255,0.04),
      0 52px 80px -34px rgba(0,0,0,0.92);
    animation:deckpop .5s var(--ease);
  }
  /* whole card settles up out of the stack on change */
  @keyframes deckpop{from{transform:translateY(12px) scale(0.97)}to{transform:none}}
  /* the card content rises up while the old one drops behind */
  .term-body{animation:cardrise .5s var(--ease)}
  @keyframes cardrise{from{opacity:0;transform:translateY(26px) scale(0.96)}to{opacity:1;transform:none}}
  .term-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .term-foot{display:flex;align-items:center;justify-content:space-between;margin-top:14px}
  .pager{font-family:'JetBrains Mono';font-size:13px;color:var(--muted);letter-spacing:0.1em}
  .pager #pgNow{color:#fff;font-weight:600}
  .navc{width:30px;height:30px;border-radius:50%;background:transparent;border:1px solid rgba(255,255,255,0.18);color:var(--muted);cursor:pointer;display:grid;place-items:center;transition:transform .3s var(--spring),color .25s,background .25s,border-color .25s}
  .navc:hover{color:#fff;background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.32)}
  .navc:active{transform:scale(0.88)}
  .term-body{font-family:'JetBrains Mono';font-size:14px;line-height:1.62;color:#fff;flex:1;white-space:pre-wrap}
  .cursor{display:inline-block;width:8px;height:15px;background:#fff;vertical-align:-2px;margin-left:1px;animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .term-cta{display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono';font-size:13px;font-weight:500;background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.2);padding:9px 16px;border-radius:999px;cursor:pointer;transition:transform .35s var(--spring),background .3s var(--ease),border-color .3s var(--ease)}
  .term-cta svg{transition:transform .35s var(--spring)}
  .term-cta:hover{background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.35)}
  .term-cta:hover svg{transform:translate(2px,-2px)}

  .card-foot{text-align:center;padding-top:12px;color:#9b968b;font-size:12px;font-weight:500}
  .card-foot b{color:var(--card-ink)}

  /* "Join 17k+" style pill below the card */
  .below{position:relative;z-index:6;display:flex;justify-content:center;margin-top:18px}
  .join{display:inline-flex;align-items:center;gap:10px;background:#fff;color:#101012;font-family:'Space Grotesk';font-weight:600;font-size:13.5px;padding:9px 9px 9px 17px;border-radius:999px;box-shadow:0 14px 30px -14px rgba(0,0,0,0.7);transition:transform .35s var(--spring)}
  .join .d{width:25px;height:25px;border-radius:50%;background:#101012;color:#fff;display:grid;place-items:center;transition:transform .35s var(--spring)}
  .join:hover{transform:translateY(-2px)}.join:hover .d{transform:translateX(2px)}

  /* ---------- STICKERS ---------- */
  .sticker{position:absolute;z-index:4;user-select:none;will-change:transform;cursor:grab;touch-action:none}
  .sticker.grabbing{cursor:grabbing}
  .sticker-pop{position:fixed;z-index:60;transform:translate(-50%,-100%);background:#fff;color:#101012;font-family:'JetBrains Mono';font-size:12.5px;font-weight:600;line-height:1.5;text-align:center;letter-spacing:-0.01em;padding:9px 14px;border-radius:13px;white-space:nowrap;pointer-events:none;box-shadow:0 16px 34px -12px rgba(0,0,0,0.7)}
  .sticker-pop::after{content:"";position:absolute;left:calc(50% + var(--tailx,0px));top:100%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#fff}
  .sticker-pop.pop-down::after{top:auto;bottom:100%;border-top-color:transparent;border-bottom-color:#fff}
  .sticker-pop.pop-right::after{top:calc(50% + var(--taily,0px));left:0;bottom:auto;transform:translate(-100%,-50%);border:6px solid transparent;border-right-color:#fff}
  .sticker-pop.pop-left::after{top:calc(50% + var(--taily,0px));left:auto;right:0;bottom:auto;transform:translate(100%,-50%);border:6px solid transparent;border-left-color:#fff}
  .sticker-pop.sticky{pointer-events:auto}
  .sticker-pop a{color:#0A66C2;text-decoration:underline;text-underline-offset:2px;font-weight:700}
  .sticker-pop a:hover{opacity:0.82}
  .plus-one{position:fixed;z-index:62;transform:translate(-50%,-100%);font-family:'Space Grotesk';font-weight:700;font-size:21px;color:var(--acc);pointer-events:none;text-shadow:0 2px 12px rgba(0,0,0,0.5)}
  .aura-badge{position:fixed;z-index:61;transform:translateY(-50%);background:rgba(216,255,107,0.14);border:1px solid rgba(216,255,107,0.5);color:var(--acc);font-family:'JetBrains Mono';font-weight:600;font-size:13px;padding:6px 12px;border-radius:999px;white-space:nowrap;pointer-events:none;backdrop-filter:blur(4px);box-shadow:0 10px 24px -12px rgba(216,255,107,0.4)}
  .aura-badge .aura-lbl{opacity:0.7;font-weight:500}
  #photo-hint{position:fixed;z-index:20;transform:translate(-100%,-50%);color:var(--acc);font-family:'JetBrains Mono';font-weight:600;font-size:13px;letter-spacing:0.02em;white-space:nowrap;pointer-events:none;display:flex;align-items:center;gap:8px;text-shadow:0 2px 12px rgba(0,0,0,0.6);animation:hintbob 1.5s ease-in-out infinite;transition:opacity .5s ease}
  #photo-hint .ar{font-size:18px;line-height:1}
  @keyframes hintbob{0%,100%{transform:translate(-100%,-50%)}50%{transform:translate(calc(-100% + 7px),-50%)}}
  .sticker *{pointer-events:none;user-select:none}
  .stk-emoji{width:62px;height:62px;border-radius:16px;display:grid;place-items:center;font-size:31px;background:#fff;border:3px solid #fff;box-shadow:0 12px 24px -10px rgba(0,0,0,0.75)}
  .stk-word{font-family:'Space Grotesk';font-weight:700;font-size:14px;letter-spacing:-0.01em;padding:8px 14px;border-radius:13px;color:#101012;background:#fff;border:3px solid #fff;box-shadow:0 12px 24px -10px rgba(0,0,0,0.75);white-space:nowrap}
  .stk-word.dark{background:#16151A;color:#fff;border-color:#16151A}
  .stk-word.lime{background:var(--acc);color:#101012;border-color:var(--acc)}
  .stk-word.green{background:var(--green);color:#0a2a14;border-color:var(--green)}
  .stk-word.blue{background:#5B8DEF;color:#fff;border-color:#5B8DEF}
  .stk-word.red{background:#FF5F57;color:#fff;border-color:#FF5F57}
  .stk-img{filter:drop-shadow(0 14px 26px rgba(0,0,0,0.65))}
  .stk-img img{display:block;width:100%;height:auto;-webkit-user-drag:none;user-drag:none}
  .stk-logo{background:#fff;border-radius:15px;padding:3.5px;box-shadow:0 14px 26px -10px rgba(0,0,0,0.7)}
  .stk-logo img{display:block;width:100%;height:auto;border-radius:12px;-webkit-user-drag:none;user-drag:none}

  @media(max-width:600px){
    .topbar{padding:12px 13px}
    .hub{width:88vw}
    .terminal{padding:13px 16px 14px;min-height:0;border-radius:18px}
    .term-head{margin-bottom:9px}
    .term-foot{margin-top:12px}
    .term-body{font-size:12.5px;line-height:1.55}
    .navc{width:27px;height:27px}
    .term-cta{font-size:11.5px;padding:7px 12px}
    .join{font-size:12px}
    .stage-glow{width:420px;height:380px}
    .sticker-pop{font-size:11.5px;padding:8px 12px}
  }
  @media(max-width:380px){.brand span.t{display:none}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important}.cursor{display:none}}
</style>
</head>

<script>
  const slides = [
    "Yo — I'm Ven.\nSydney-based, endlessly curious,\nand looking for a team\nI can actually grow with.",
    "Off the clock I'm down rabbit holes —\nrobots, nuclear energy, markets —\nthen I back the ideas\nI believe in with my own money.",
    "How I work:\n  I turn messy into clear,\n  I'd rather over-prepare than wing it,\n  and I own what I take on.",
    "I mentor students at UNSW —\nturns out I really like making\ncomplicated things finally\nclick for people.",
    "I ask a lot of questions,\nlearn fast, and care about\ngetting the small details right.\nThat's just how I'm wired.",
    "Curious, sharp, and genuinely keen.\nIf that sounds like someone\nyour team could use —\nlet's talk →"
  ];
  const typed = document.getElementById('typed');
  const pgNow = document.getElementById('pgNow');
  document.getElementById('pgTot').textContent = slides.length;
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  let idx = 0, charTimer = null, holdTimer = null;

  function clearTimers(){ clearTimeout(charTimer); clearTimeout(holdTimer); }
  const termBody = document.querySelector('.term-body');
  const terminalEl = document.querySelector('.terminal');
  function retrigger(el){ if(el){ el.style.animation='none'; void el.offsetHeight; el.style.animation=''; } }
  function render(i, animate){
    clearTimers();
    idx = (i + slides.length) % slides.length;
    pgNow.textContent = idx + 1;
    // card rises up, whole deck settles
    retrigger(termBody); retrigger(terminalEl);
    const text = slides[idx];
    if(reduce || !animate){ typed.textContent = text; scheduleNext(); return; }
    typed.textContent = ""; let c = 0;
    (function step(){
      typed.textContent = text.slice(0, c);
      if(c++ <= text.length){ charTimer = setTimeout(step, 16 + Math.random()*22); }
      else { scheduleNext(); }
    })();
  }
  function scheduleNext(){ holdTimer = setTimeout(()=>render(idx + 1, true), 4400); }
  document.getElementById('next').addEventListener('click', ()=>render(idx + 1, true));
  document.getElementById('prev').addEventListener('click', ()=>render(idx - 1, true));
  render(0, true);

  // gentle float (on inner content) + free dragging (on the sticker) + saved layout
  const noMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const STORE_KEY = 'venStickerLayout_v1';
  let saved = {};
  try { saved = JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch(e){ saved = {}; }
  // stable tilt per sticker (so rotation doesn't change between reloads)
  function tiltFor(id){ let h=0; for(const c of id) h=(h*31+c.charCodeAt(0))>>>0; return ((h%2200)/100)-11; }
  function saveLayout(){
    const data = {};
    document.querySelectorAll('.sticker').forEach(s=>{
      data[s.dataset.id] = { tx: parseFloat(s.dataset.tx)||0, ty: parseFloat(s.dataset.ty)||0 };
    });
    try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); } catch(e){}
  }
  // optional reset: append #reset to the URL to clear a saved layout
  if (location.hash === '#reset'){ try{ localStorage.removeItem(STORE_KEY); }catch(e){} location.replace(location.pathname); }

  document.querySelectorAll('.sticker').forEach((s, i)=>{
    const id = (s.querySelector('img') ? s.querySelector('img').getAttribute('alt') : s.textContent.trim()) || 'x';
    s.dataset.id = id;
    const st = saved[id] || {};
    const rot = tiltFor(id);
    const tx = typeof st.tx === 'number' ? st.tx : 0;
    const ty = typeof st.ty === 'number' ? st.ty : 0;
    s.dataset.rot = rot.toFixed(2);
    s.dataset.tx = tx; s.dataset.ty = ty;
    s.style.transform = `translate(${tx}px,${ty}px) rotate(${rot.toFixed(2)}deg)`;

    // staggered fade-in on load (opacity only — never touches the drag/rotate transform)
    if(!noMotion){
      s.animate(
        [{opacity:0},{opacity:0},{opacity:1}],
        {duration:700, delay: 260 + i*45, easing:'cubic-bezier(0.32,0.72,0,1)', fill:'backwards'}
      );
    }

    // float only the inner content so it composes with the drag transform
    const child = s.firstElementChild;
    if(child && !noMotion){
      const dur = (3.6 + Math.random()*2.4)*1000, delay = Math.random()*2000;
      child.animate(
        [{transform:'translateY(0)'},{transform:'translateY(-8px)'},{transform:'translateY(0)'}],
        {duration: dur, iterations: Infinity, delay, easing:'ease-in-out'}
      );
    }

    // drag (with click-vs-drag detection)
    let sx, sy, bx, by, moved;
    s.addEventListener('pointerdown', (e)=>{
      s.setPointerCapture(e.pointerId);
      s.classList.add('grabbing');
      s.style.zIndex = 50;
      sx = e.clientX; sy = e.clientY;
      bx = parseFloat(s.dataset.tx) || 0;
      by = parseFloat(s.dataset.ty) || 0;
      moved = false;
      e.preventDefault();
    });
    s.addEventListener('pointermove', (e)=>{
      if(!s.hasPointerCapture(e.pointerId)) return;
      const dx = e.clientX - sx, dy = e.clientY - sy;
      if(Math.hypot(dx, dy) > 5) moved = true;
      const tx = bx + dx, ty = by + dy;
      s.dataset.tx = tx; s.dataset.ty = ty;
      s.style.transform = `translate(${tx}px,${ty}px) rotate(${s.dataset.rot}deg)`;
    });
    const end = (e)=>{
      s.classList.remove('grabbing');
      try{ s.releasePointerCapture(e.pointerId); }catch(_){}
      if(moved){ saveLayout(); } else { handleStickerClick(s); }
    };
    s.addEventListener('pointerup', end);
    s.addEventListener('pointercancel', ()=>{ s.classList.remove('grabbing'); });
  });

  /* ---------- sticker click actions ---------- */
  const ACTIONS = {
    'Ven':        { type:'linkPopup', place:'right', html:'Hey, it’s me — Ven 👋<br>Have a play: click and drag the stickers around —<br>each one of them does something.' },
    'Headphones': { type:'song', videoId:'tGv7CUutzqU', label:'♪  Now Playing “About You” by The 1975' },
    'LinkedIn':   { type:'linkPopup', html:'visit my <a href="https://linkedin.com/in/venk1" target="_blank" rel="noopener">linkedin</a>' },
    'Kangaroo':   { type:'linkPopup', html:'been in Australia 🇦🇺 since 2024,<br>i love it down under' },
    'Cash':       { type:'linkPopup', html:'for the money? nah the truth is<br>i do it for the children' },
    'UNSW':       { type:'linkPopup', offsetX:130, html:'Completed Master of Commerce from UNSW in 2026,<br>dual majored in Finance &amp; Economics' },
    'Robot':      { type:'linkPopup', html:'Ven is very interested in Robots and Nuclear Energy<br>(spends quite a lot of time researching about it<br>and the companies too).<br>View his <a href="stocks.html">Portfolio Holdings</a>' },
    'MacBook':    { type:'linkPopup', html:'<a href="mailto:venkatesh1@unswalumni.com">email me</a>' },
    'Polaroid':   { type:'flash', label:'looking good' },
    'Coffee':     { type:'linkPopup', html:'Ven loves coffee, his go to order is<br>either a long black or a latte<br>with a spoon of sugar in it' },
    'Phone':      { type:'linkPopup', html:'<a href="tel:+61481239991">call</a> &nbsp;/&nbsp; <a href="sms:+61481239991">message</a> &nbsp;/&nbsp; <a href="https://wa.me/61481239991" target="_blank" rel="noopener">whatsapp</a>' },
    'Basketball': { type:'linkPopup', html:'not the biggest basketball fan,<br>but i love the sport' },
    'Thumbs up':  { type:'thumb' }
  };

  // global, shared-across-everyone aura counter (counterapi.dev — no key needed)
  const AURA_BASE = 'https://api.counterapi.dev/v1/ven-venk1-live/aura';
  fetch(AURA_BASE + '/')   // prime last-known total on load (read-only, does NOT increment)
    .then(r => r.json())
    .then(d => { if (d && typeof d.count === 'number') localStorage.setItem('venAuraLast', d.count); })
    .catch(()=>{});

  // ---- mobile: shrink + rearrange the stickers into top/bottom bands around the card ----
  const MOBILE_Q = window.matchMedia('(max-width:600px)');
  const mobileLayout = {
    'MacBook':   {t:'3%',  l:'2%',  w:64},
    'Ven':       {t:'1%',  l:'34%', w:88},
    'Polaroid':  {t:'4%',  l:'77%', w:50},
    'UNSW':      {t:'16%', l:'4%',  w:54},
    'Headphones':{t:'18%', l:'42%', w:48},
    'Cash':      {t:'15%', l:'73%', w:58},
    'Robot':     {t:'68%', l:'3%',  w:60},
    'Coffee':    {t:'68%', l:'40%', w:52},
    'Phone':     {t:'67%', l:'77%', w:52},
    'LinkedIn':  {t:'83%', l:'7%',  w:50},
    'Kangaroo':  {t:'83%', l:'33%', w:86},
    'Basketball':{t:'85%', l:'76%', w:50},
    'Thumbs up': {t:'88%', l:'45%', w:46}
  };
  function applyMobileLayout(){
    const mob = MOBILE_Q.matches;
    document.querySelectorAll('.sticker').forEach(s=>{
      const inner = s.firstElementChild;
      if(!s.dataset.dinit){           // remember the desktop position/size once
        s.dataset.dtop = s.style.top||''; s.dataset.dleft = s.style.left||'';
        s.dataset.dright = s.style.right||''; s.dataset.dbottom = s.style.bottom||'';
        s.dataset.dw = (inner && inner.style.width) || '';
        s.dataset.dinit = '1';
      }
      const m = mobileLayout[s.dataset.id];
      if(mob && m){
        s.style.top = m.t; s.style.left = m.l; s.style.right = 'auto'; s.style.bottom = 'auto';
        if(inner) inner.style.width = m.w + 'px';
      } else {
        s.style.top = s.dataset.dtop; s.style.left = s.dataset.dleft;
        s.style.right = s.dataset.dright; s.style.bottom = s.dataset.dbottom;
        if(inner) inner.style.width = s.dataset.dw;
      }
    });
  }
  applyMobileLayout();
  if(MOBILE_Q.addEventListener) MOBILE_Q.addEventListener('change', applyMobileLayout);
  else MOBILE_Q.addListener(applyMobileLayout);

  // YouTube IFrame API player — lets us set a low volume and pause/resume
  const SONG_VOLUME = 22;      // 0–100, keep it gentle
  let player = null, ytApiState = 'none';
  const apiQueue = [];
  function ensureYTApi(cb){
    if(window.YT && window.YT.Player){ cb(); return; }
    apiQueue.push(cb);
    if(ytApiState === 'none'){
      ytApiState = 'loading';
      const t = document.createElement('script');
      t.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(t);
    }
  }
  window.onYouTubeIframeAPIReady = function(){ ytApiState = 'ready'; apiQueue.splice(0).forEach(cb => cb()); };
  function createPlayer(videoId){
    const host = document.createElement('div');
    host.style.cssText = 'position:fixed;right:0;bottom:0;width:1px;height:1px;opacity:0.01;pointer-events:none;z-index:-1';
    document.body.appendChild(host);
    player = new YT.Player(host, {
      videoId: videoId,
      playerVars: { autoplay:1, playsinline:1, rel:0 },
      events: { onReady: (e)=>{ e.target.setVolume(SONG_VOLUME); e.target.playVideo(); } }
    });
  }

  // position a popup near the sticker, clamped inside the viewport; flips below if no room above
  function positionPopup(p, s, offsetX, place){
    offsetX = offsetX || 0;
    const r = s.getBoundingClientRect();
    const w = p.offsetWidth || 220, h = p.offsetHeight || 60;
    const margin = 14, vw = window.innerWidth, vh = window.innerHeight;
    const cxS = r.left + r.width/2, cyS = r.top + r.height/2;
    p.classList.remove('pop-down','pop-right','pop-left');

    if(place === 'right'){                              // beside the sticker, prefer right, flip left if tight
      const onRight = (r.right + 12 + w) <= (vw - margin);
      let top = Math.max(margin + h/2, Math.min(vh - margin - h/2, cyS));
      if(onRight){ p.classList.add('pop-right'); p.style.left = (r.right + 12) + 'px'; p.style.transform = 'translate(0,-50%)'; }
      else       { p.classList.add('pop-left');  p.style.left = (r.left - 12) + 'px';  p.style.transform = 'translate(-100%,-50%)'; }
      p.style.top = top + 'px';
      let ty = cyS - top; const tmv = h/2 - 12; ty = Math.max(-tmv, Math.min(tmv, ty));
      p.style.setProperty('--taily', ty + 'px');
      return;
    }

    let cx = cxS + offsetX;                             // default: above, flip below if no room
    cx = Math.max(margin + w/2, Math.min(vw - margin - w/2, cx));
    const below = (r.top - 12 - h) < margin;
    if(below) p.classList.add('pop-down');
    p.style.left = cx + 'px';
    p.style.top  = below ? (r.bottom + 12) + 'px' : (r.top - 12) + 'px';
    p.style.transform = below ? 'translate(-50%,0)' : 'translate(-50%,-100%)';
    let tail = cxS - cx;
    const tmax = w/2 - 14;
    tail = Math.max(-tmax, Math.min(tmax, tail));
    p.style.setProperty('--tailx', tail + 'px');
  }

  function showPopup(s, text){
    const p = document.createElement('div');
    p.className = 'sticker-pop';
    p.textContent = text;
    document.body.appendChild(p);
    positionPopup(p, s, 0);
    p.animate([
      {opacity:0}, {opacity:1, offset:0.14}, {opacity:1, offset:0.8}, {opacity:0}
    ], {duration:3400, easing:'ease'});
    setTimeout(()=>p.remove(), 3450);
  }

  // sticky popup: stays until you click somewhere else; its contents are clickable
  let stickyPopup = null, stickyCloser = null;
  function closeSticky(){
    if(stickyPopup){ stickyPopup.remove(); stickyPopup = null; }
    if(stickyCloser){ document.removeEventListener('pointerdown', stickyCloser, true); stickyCloser = null; }
  }
  function showStickyPopup(s, html, offsetX, place){
    closeSticky();
    const p = document.createElement('div');
    p.className = 'sticker-pop sticky';
    p.innerHTML = html;
    document.body.appendChild(p);
    positionPopup(p, s, offsetX, place);
    p.animate([{opacity:0},{opacity:1}], {duration:300, easing:'ease', fill:'forwards'});
    stickyPopup = p;
    stickyCloser = (e)=>{
      if(p.contains(e.target)) return;   // clicking the popup/link keeps it open
      if(s.contains(e.target)) return;   // clicking the owner sticker is handled by its own click
      closeSticky();
    };
    setTimeout(()=> document.addEventListener('pointerdown', stickyCloser, true), 0);
  }

  // thumbs-up: a quick "+1" and a lingering, persistent "aura" total
  function floatPlusOne(s){
    const r = s.getBoundingClientRect();
    const p = document.createElement('div');
    p.className = 'plus-one';
    p.textContent = '+1';
    document.body.appendChild(p);
    p.style.left = (r.left + r.width/2) + 'px';
    p.style.top  = (r.top - 4) + 'px';
    p.animate([
      {opacity:0, transform:'translate(-50%,-100%) translateY(6px) scale(0.9)'},
      {opacity:1, transform:'translate(-50%,-100%) translateY(-4px) scale(1)', offset:0.25},
      {opacity:0, transform:'translate(-50%,-100%) translateY(-28px) scale(1)'}
    ], {duration:1600, easing:'cubic-bezier(0.32,0.72,0,1)'});
    setTimeout(()=>p.remove(), 1650);
  }
  let auraEl = null, auraTimer = null;
  function showAura(s, count){
    const r = s.getBoundingClientRect();
    if(!auraEl){ auraEl = document.createElement('div'); auraEl.className = 'aura-badge'; document.body.appendChild(auraEl); }
    auraEl.innerHTML = '✦ ' + count + ' <span class="aura-lbl">aura</span>';
    auraEl.style.left = (r.right + 10) + 'px';
    auraEl.style.top  = (r.top + r.height/2) + 'px';
    auraEl.animate([
      {transform:'translateY(-50%) scale(0.7)'},
      {transform:'translateY(-50%) scale(1.12)', offset:0.6},
      {transform:'translateY(-50%) scale(1)'}
    ], {duration:340, easing:'cubic-bezier(0.34,1.56,0.64,1)'});
    auraEl.style.opacity = '1';
    clearTimeout(auraTimer);
    auraTimer = setTimeout(()=>{
      const el = auraEl;
      if(!el) return;
      el.animate([{opacity:1},{opacity:0}], {duration:650, fill:'forwards'});
      setTimeout(()=>{ el.remove(); if(auraEl === el) auraEl = null; }, 670);
    }, 7000);
  }

  // camera-style screen flash
  function flashScreen(){
    const f = document.createElement('div');
    f.style.cssText = 'position:fixed;inset:0;z-index:70;background:#fff;pointer-events:none;opacity:0';
    document.body.appendChild(f);
    f.animate([
      {opacity:0}, {opacity:0.95, offset:0.12}, {opacity:0}
    ], {duration:520, easing:'ease-out'});
    setTimeout(()=>f.remove(), 540);
  }

  // soft "pop" click sound (synthesized — no audio file needed)
  let actx = null;
  function popSound(){
    try{
      actx = actx || new (window.AudioContext || window.webkitAudioContext)();
      if(actx.state === 'suspended') actx.resume();
      const t = actx.currentTime;
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(540, t);
      o.frequency.exponentialRampToValueAtTime(190, t + 0.09);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.16, t + 0.006);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.13);
      o.connect(g); g.connect(actx.destination);
      o.start(t); o.stop(t + 0.15);
    }catch(e){}
  }

  // onboarding hint to the left of the photo
  function showPhotoHint(){
    const ph = [...document.querySelectorAll('.sticker')].find(s=>s.dataset.id==='Ven');
    if(!ph || document.getElementById('photo-hint')) return;
    const r = ph.getBoundingClientRect();
    const h = document.createElement('div');
    h.id = 'photo-hint';
    h.innerHTML = 'click the photo <span class="ar">→</span>';
    document.body.appendChild(h);
    h.style.left = (r.left - 16) + 'px';
    h.style.top  = (r.top + r.height/2) + 'px';
    setTimeout(dismissPhotoHint, 16000);
  }
  function dismissPhotoHint(){
    const h = document.getElementById('photo-hint');
    if(h){ h.style.opacity = '0'; setTimeout(()=>h.remove(), 500); }
  }

  function handleStickerClick(s){
    const action = ACTIONS[s.dataset.id];
    if(!action) return;
    popSound();
    dismissPhotoHint();
    if(action.type === 'linkPopup'){
      showStickyPopup(s, action.html, action.offsetX, action.place);
      return;
    }
    if(action.type === 'flash'){
      flashScreen();
      setTimeout(()=> showPopup(s, action.label), 130);
      return;
    }
    if(action.type === 'thumb'){
      floatPlusOne(s);
      // show an instant optimistic total, then correct it with the real global count
      const optimistic = (parseInt(localStorage.getItem('venAuraLast') || '0', 10) || 0) + 1;
      showAura(s, optimistic);
      fetch(AURA_BASE + '/up')
        .then(r => r.json())
        .then(d => { if (d && typeof d.count === 'number'){ localStorage.setItem('venAuraLast', d.count); showAura(s, d.count); } })
        .catch(()=>{});
      return;
    }
    if(action.type === 'song'){
      if(!player){                                   // first click — load + play
        ensureYTApi(()=> createPlayer(action.videoId));
        showPopup(s, action.label);
        return;
      }
      if(!player.getPlayerState) return;             // still initialising, ignore
      if(player.getPlayerState() === 1){             // 1 = playing → pause
        player.pauseVideo();
        showPopup(s, '⏸  Paused');
      } else {                                       // paused/ended → resume
        player.setVolume(SONG_VOLUME);
        player.playVideo();
        showPopup(s, action.label);
      }
    }
  }

  // show the "click the photo" hint shortly after load (once stickers have settled in)
  setTimeout(showPhotoHint, 1500);
</script>
